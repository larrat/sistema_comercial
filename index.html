<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" href="data:,"> <!-- Resolve o erro 404 do favicon -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sistema Comercial</title>
<link rel="stylesheet" href="./css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- SETUP -->
<div id="screen-setup" class="screen">
  <div class="setup-card">
    <h2>Selecione a Filial</h2>
    <div id="fil-grid" class="fil-grid"></div>
    <button class="btn btn-p" onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="screen-app" class="screen">
  <nav class="sb">
    <button onclick="ir('dashboard')">Dashboard</button>
    <button onclick="ir('produtos')">Produtos</button>
    <button onclick="ir('cotacao')">Cotação</button>
  </nav>
  
  <main class="main">
    <div id="pg-dashboard" class="pg"><h2>Dashboard</h2></div>
    
    <div id="pg-produtos" class="pg">
      <div class="fb">
        <h2>Produtos</h2>
        <button onclick="document.getElementById('modal-produto').classList.add('on')">+ Novo</button>
      </div>
      <div id="prod-lista"></div>
    </div>

    <div id="pg-cotacao" class="pg">
      <h2>Importar Cotação</h2>
      <select id="cot-forn-sel" class="inp"></select>
      <input type="file" onchange="cotFile(event)">
      <div id="cot-logs"></div>
    </div>
  </main>
</div>

<!-- MODAL PRODUTO -->
<div id="modal-produto" class="modal-wrap">
  <div class="modal-box">
    <h3>Produto</h3>
    <input id="p-nome" class="inp" placeholder="Nome">
    <input id="p-custo" class="inp" type="number" placeholder="Custo">
    <div id="p-hist-cot" class="panel"></div>
    <button class="btn btn-p" onclick="salvarProduto()">Salvar</button>
    <button onclick="this.closest('.modal-wrap').classList.remove('on')">Fechar</button>
  </div>
</div>

<!-- MODAL MAPA -->
<div id="modal-mapa" class="modal-wrap">
  <div class="modal-box">
    <h3 id="mapa-titulo">Mapear</h3>
    <div id="mapa-body"></div>
  </div>
</div>

<div id="toast"></div>
<script type="module" src="./js/main.js"></script>
</body>
</html>
