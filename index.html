<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Sistema Comercial</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;500;600;700&family=DM+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        window.__SC_SUPABASE_URL__ =
          window.__SC_SUPABASE_URL__ || 'https://eiycrokqwhmfmjackjni.supabase.co';
        window.__SC_SUPABASE_KEY__ =
          window.__SC_SUPABASE_KEY__ || 'sb_publishable_Hc1MlzrIX9c79PEHiylpTA_9787bYHJ';
        window.__SC_ALLOW_LEGACY_SUPABASE_DEFAULTS__ = true;
        if (!localStorage.getItem('sc_supabase_url'))
          localStorage.setItem('sc_supabase_url', window.__SC_SUPABASE_URL__);
        if (!localStorage.getItem('sc_supabase_key'))
          localStorage.setItem('sc_supabase_key', window.__SC_SUPABASE_KEY__);

        var h = window.location.hostname;
        var isLocal =
          window.location.protocol === 'file:' ||
          h === 'localhost' ||
          h === '127.0.0.1' ||
          /^10\./.test(h) ||
          /^192\.168\./.test(h) ||
          /^172\.(1[6-9]|2\d|3[0-1])\./.test(h) ||
          h.endsWith('.local');
        if (isLocal) {
          window.__SC_WARN_CONFIG__ =
            typeof window.__SC_WARN_CONFIG__ === 'boolean' ? window.__SC_WARN_CONFIG__ : true;
          window.__SC_REQ_TIMEOUT_MS__ = Number(window.__SC_REQ_TIMEOUT_MS__ || 15000);
          window.__SC_RETRY_MAX__ = Number(window.__SC_RETRY_MAX__ || 1);
          window.__SC_RETRY_BASE_MS__ = Number(window.__SC_RETRY_BASE_MS__ || 200);
          window.__SC_E2E_MODE__ = window.__SC_E2E_MODE__ === true;
          window.__SC_E2E_UI_CORE__ = window.__SC_E2E_UI_CORE__ === true;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/react/main.tsx"></script>
  </body>
</html>
